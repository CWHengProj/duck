name: Go release management

on:
    push:
        branches:
            'main'

permissions:
  contents: write   # allows pushing Git tags
  
jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: echo "pulled from repo"

      - name: Setup Go
        uses: actions/setup-go@v5
        
      - name: Build binaries
        run: |
            GOOS=linux GOARCH=amd64 go build -o duck-linux-amd64
            GOOS=darwin GOARCH=amd64 go build -o duck-darwin-amd64
            GOOS=windows GOARCH=amd64 go build -o duck-windows-amd64.exe

      - name: Determine next version from last tag
        id: semver
        run: |
          # Fetch all tags (sometimes needed explicitly)
          git fetch --tags --prune
          # Get the latest tag, or 0.0.0 if none
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "Latest tag: $LATEST_TAG"
          MAJOR=$(echo "$LATEST_TAG" | cut -d '.' -f 1)
          MINOR=$(echo "$LATEST_TAG" | cut -d '.' -f 2)
          PATCH=$(echo "$LATEST_TAG" | cut -d '.' -f 3)
          NEXT_MAJOR=$MAJOR
          NEXT_MINOR=$MINOR
          NEXT_PATCH=$((PATCH + 1))
          # Check commit message for [major] or [minor]
          if [[ "${{ github.event.head_commit.message }}" =~ \[major\] ]]; then
            NEXT_MAJOR=$((MAJOR + 1))
            NEXT_MINOR=0
            NEXT_PATCH=0
          elif [[ "${{ github.event.head_commit.message }}" =~ \[minor\] ]]; then
            NEXT_MINOR=$((MINOR + 1))
            NEXT_PATCH=0
          fi
          NEXT_VERSION="${NEXT_MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}"
          echo "Computed next version: $NEXT_VERSION"
          # Export variables
          echo "VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "MAJOR=$NEXT_MAJOR" >> $GITHUB_ENV
      - name: Push new Git tag
        run: |
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create and push the new tag
          git tag "${{ env.VERSION }}" -m "ci: release version ${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"
      - name: Fetch PR Metadata and Commits
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get PR details
          PR_JSON=$(gh pr list --search "${{ github.sha }}" --state merged --json number,title,body --limit 1 | jq '.[0]')
          
          # 2. Extract Title and Body
          echo "title=$(echo $PR_JSON | jq -r '.title // "Manual Release"')" >> $GITHUB_OUTPUT
          echo "body=$(echo $PR_JSON | jq -r '.body // ""')" >> $GITHUB_OUTPUT
          
          # 3. Get commit list (Works for both Squash and Regular merges)
          PR_NUM=$(echo $PR_JSON | jq -r '.number // ""')
          if [ -n "$PR_NUM" ]; then
            gh pr view $PR_NUM --json commits --template '{{range .commits}}• {{.messageHeadline}} ({{.oid | printf "%.7s"}}){{"\n"}}{{end}}' > commits.txt
          else
            git log --pretty=format:"• %s (%h)" -n 5 > commits.txt
          fi
      - name: Build release notes file
        run: |
          echo "## ${{ steps.pr_info.outputs.title }}" > release_body.md
          
          if [[ -n "${{ steps.pr_info.outputs.body }}" ]]; then
            echo -e "\n### Summary\n${{ steps.pr_info.outputs.body }}" >> release_body.md
          fi

          echo -e "\n### Changes" >> release_body.md
          cat commits.txt >> release_body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            duck-linux-amd64
            duck-darwin-amd64
            duck-windows-amd64.exe  
